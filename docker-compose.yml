# SSL/TLS: Replace self-signed certs in docker/nginx/certs with Let's Encrypt certificates.
# Run on the host: sudo certbot certonly --standalone -d yourdomain.com
# Then copy: sudo cp /etc/letsencrypt/live/yourdomain.com/fullchain.pem ./docker/nginx/certs/
# And:     sudo cp /etc/letsencrypt/live/yourdomain.com/privkey.pem ./docker/nginx/certs/
# For auto-renewal, add a cron job: 0 3 * * * docker compose run --rm certbot renew && docker compose exec nginx nginx -s reload

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  postgres:
    logging: *default-logging
    image: postgres:16.9-alpine
    container_name: kitchen-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kitchen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kitchen_db}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_command=mkdir -p /backups/wal && test ! -f /backups/wal/%f && cp %p /backups/wal/%f
      - -c
      - archive_timeout=60
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kitchen} -d ${POSTGRES_DB:-kitchen_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: false
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    networks:
      - kitchen-net

  redis:
    logging: *default-logging
    image: redis:7.4-alpine
    container_name: kitchen-redis
    restart: unless-stopped
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    networks:
      - kitchen-net

  api:
    logging: *default-logging
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: kitchen-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-kitchen}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kitchen_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-orders@thekatanguriskitchen.com}
      APP_URL: ${APP_URL:-http://localhost:3000}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      MAX_SSE_CLIENTS: ${MAX_SSE_CLIENTS:-500}
      DB_POOL_MAX: ${DB_POOL_MAX:-50}
      ENABLE_DEV_BYPASS: ${ENABLE_DEV_BYPASS:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    networks:
      - kitchen-net

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: kitchen-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - API_URL=http://api:3001
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - NEXTAUTH_URL=${APP_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    networks:
      - kitchen-net

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: kitchen-admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      - API_URL=http://api:3001
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - NEXTAUTH_URL=${APP_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    networks:
      - kitchen-net

  loki:
    image: grafana/loki:3.1.0
    container_name: kitchen-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./docker/loki:/etc/loki:ro
      - lokidata:/loki
    command: -config.file=/etc/loki/loki-config.yml
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    networks:
      - kitchen-net

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: kitchen-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - promdata:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    networks:
      - kitchen-net

  nginx:
    image: nginx:1.27-alpine
    container_name: kitchen-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - admin
      - api
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    networks:
      - kitchen-net

  backup:
    image: postgres:16.9-alpine
    container_name: kitchen-backup
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kitchen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kitchen_db}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache bash aws-cli
        echo "0 3 * * * pg_dump -U $${POSTGRES_USER} -d $${POSTGRES_DB} -Fc -f /backups/$${POSTGRES_DB}_$$(date +\%Y\%m\%d).dump && find /backups -name '*.dump' -mtime +30 -delete && if [ -n \"$${S3_BUCKET}\" ]; then AWS_ACCESS_KEY_ID=$${S3_ACCESS_KEY_ID} AWS_SECRET_ACCESS_KEY=$${S3_SECRET_ACCESS_KEY} AWS_ENDPOINT_URL=$${S3_ENDPOINT_URL} AWS_REGION=$${S3_REGION} aws s3 sync /backups s3://$${S3_BUCKET}/backups/ && find /backups -name '*.dump' -mtime +90 -delete; fi" | crontab -
        crond -f -l 2
    healthcheck:
      test: ["CMD-SHELL", "which pg_dump"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - backups:/backups
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kitchen-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: kitchen-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3003}
    volumes:
      - grafanadata:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "127.0.0.1:3003:3000"
    depends_on:
      - prometheus
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    networks:
      - kitchen-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: kitchen-alertmanager
    restart: unless-stopped
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./docker/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    networks:
      - kitchen-net

  promtail:
    image: grafana/promtail:2.9.0
    container_name: kitchen-promtail
    volumes:
      - ./docker/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - kitchen-net

volumes:
  pgdata:
  redisdata:
  promdata:
  grafanadata:
  lokidata:
  backups:

networks:
  kitchen-net:
    driver: bridge
