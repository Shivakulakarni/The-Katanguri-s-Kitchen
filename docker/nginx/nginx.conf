# ═══════════════════════════════════════════════════════════
# Nginx Reverse Proxy — The Katanguri's Kitchen
# Provides rate limiting, security headers, and SSE pass-through
#
# SSL Setup (replace self-signed certs with real ones):
#   1. Run: docker compose up -d nginx
#   2. Install certbot: apt install certbot python3-certbot-nginx
#   3. Run: certbot --nginx -d thekatanguriskitchen.com -d admin.thekatanguriskitchen.com
#   4. Restart nginx: docker compose exec nginx nginx -s reload
# Self-signed certs are auto-generated in docker/nginx/certs/ for initial setup
# ═══════════════════════════════════════════════════════════

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# Upstream definitions
upstream web_backend {
    server web:3000;
    keepalive 32;
}

upstream admin_backend {
    server admin:3002;
    keepalive 32;
}

upstream api_backend {
    server api:3001;
    keepalive 32;
}

# ═══════════════════════════════════════════════════════════
# HTTP server — redirects all traffic to HTTPS
# ═══════════════════════════════════════════════════════════
server {
    listen 80;
    server_name thekatanguriskitchen.com admin.thekatanguriskitchen.com _;

    # Security headers (even on HTTP redirect)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    server_tokens off;

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ═══════════════════════════════════════════════════════════
# HTTPS server
# ═══════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name thekatanguriskitchen.com admin.thekatanguriskitchen.com;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.stripe.com wss://*.supabase.co; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://js.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
    server_tokens off;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # ── Block metrics endpoint from external access ──
    location = /api/v1/metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://api_backend;
    }

    # API proxy
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api_backend;
        proxy_read_timeout 60s;
    }

    # SSE streams — no buffering
    location ~ ^/api/v1/(orders|menu)/stream {
        proxy_pass http://api_backend;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # Admin panel
    location /admin/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://admin_backend;
        proxy_read_timeout 30s;
    }

    # Everything else → Web app
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://web_backend;
        proxy_read_timeout 30s;
    }
}

