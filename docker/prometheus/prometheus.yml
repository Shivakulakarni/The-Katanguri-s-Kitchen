global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── Kitchen API metrics ──
  - job_name: 'kitchen-api'
    static_configs:
      - targets: ['host.docker.internal:3001']
    metrics_path: '/api/v1/metrics'
    scrape_interval: 10s

  # ── Prometheus self-monitoring ──
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Jaeger (if using Jaeger metrics) ──
  - job_name: 'jaeger'
    static_configs:
      - targets: ['host.docker.internal:14269']
    scrape_interval: 30s
    metrics_path: '/metrics'
