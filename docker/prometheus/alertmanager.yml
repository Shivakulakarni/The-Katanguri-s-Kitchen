global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 1h

receivers:
  - name: 'default'
    # Configure email or Slack here:
    # email_configs:
    #   - to: 'admin@thekatanguriskitchen.com'
    #     from: 'alerts@thekatanguriskitchen.com'
    #     smarthost: 'smtp.gmail.com:587'
    #     auth_username: 'alerts@thekatanguriskitchen.com'
    #     auth_password: 'CHANGE_ME'
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/CHANGE_ME'
    #     channel: '#kitchen-alerts'
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ .CommonAnnotations.summary }}'
    webhook_configs:
      - url: 'http://api:3001/api/v1/config/sentry-errors'
        send_resolved: true

  - name: 'critical'
    # Same as above but for critical alerts with shorter repeat interval
    webhook_configs:
      - url: 'http://api:3001/api/v1/config/sentry-errors'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
