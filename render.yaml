services:
  # ── Fastify API Server ──
  - type: web
    name: kitchen-api
    runtime: node
    plan: free
    buildCommand: |
      rm -rf apps/api/dist
      npm cache clean --force
      npm install --include=dev
      npm run build -w packages/shared
      npm run build -w apps/api
    startCommand: cd apps/api && node dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: kitchen-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: kitchen-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ENABLE_DEV_BYPASS
        value: "false"
      - key: LOG_LEVEL
        value: info

  # ── Next.js Web App ──
  - type: web
    name: kitchen-web
    runtime: node
    plan: free
    buildCommand: |
      cd apps/web
      npm install
      npm run build
    startCommand: cd apps/web && node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        fromService:
          name: kitchen-api
          property: host
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true

  # ── Next.js Admin Dashboard ──
  - type: web
    name: kitchen-admin
    runtime: node
    plan: free
    buildCommand: |
      cd apps/admin
      npm install
      npm run build
    startCommand: cd apps/admin && node server.js
    healthCheckPath: /admin
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        fromService:
          name: kitchen-api
          property: host
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true

# ── Databases ──
databases:
  - name: kitchen-db
    plan: free
    databaseName: kitchen_db
    user: kitchen

  - name: kitchen-redis
    plan: free
