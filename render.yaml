services:
  # ── Fastify API Server ──
  - type: web
    name: kitchen-api
    runtime: node
    plan: free
    buildCommand: |
      npm install --include=dev
      npm run build -w packages/shared
      npm run build -w apps/api
    startCommand: cd apps/api && node dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: kitchen-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: kitchen-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://the-katanguris-kitchen.vercel.app,https://the-katanguris-kitchen-admin.vercel.app"
      - key: APP_URL
        value: "https://the-katanguris-kitchen.vercel.app"
      - key: RESEND_FROM_EMAIL
        value: "orders@thekatanguriskitchen.com"
      - key: ALERT_EMAIL_TO
        value: "admin@thekatanguriskitchen.com"
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: ENABLE_DEV_BYPASS
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: KITCHEN_LAT
        value: "17.9784"
      - key: KITCHEN_LNG
        value: "79.5941"
      - key: RESEND_API_KEY
        value: ""
      - key: SUPABASE_JWT_SECRET
        value: "f9014275-a96b-4c3c-b960-a81cf125ae97"
      - key: SUPABASE_URL
        value: "https://jtlysqdvodxirnxotxlw.supabase.co"
      - key: SUPABASE_ANON_KEY
        value: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0bHlzcWR2b2R4aXJueG90eGx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTAzMzIsImV4cCI6MjA5NjQ4NjMzMn0.tH9BY_jVE7CPHZ1jLskr24nhbp15R49CzmWzZmuyW7g"

  # ── Redis Key-Value Store ──
  - type: keyvalue
    name: kitchen-redis
    plan: free
    ipAllowList: []

# ── Databases ──
databases:
  - name: kitchen-db
    plan: free
    databaseName: kitchen_db
    user: kitchen
