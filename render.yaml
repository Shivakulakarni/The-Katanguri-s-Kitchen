services:
  # ── Fastify API Server ──
  - type: web
    name: kitchen-api
    runtime: node
    plan: free
    buildCommand: |
      npm install
      npm run build -w packages/shared
      npm run build -w apps/api
    startCommand: cd apps/api && node dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: kitchen-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: kitchen-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://the-katanguris-kitchen.vercel.app,https://the-katanguris-kitchen-admin.vercel.app"
      - key: APP_URL
        value: "https://the-katanguris-kitchen.vercel.app"
      - key: SENDGRID_FROM_EMAIL
        value: "orders@thekatanguriskitchen.com"
      - key: ALERT_EMAIL_TO
        value: "admin@thekatanguriskitchen.com"
      - key: TWILIO_PHONE_NUMBER
        value: "+919676164725"
      - key: ENABLE_DEV_BYPASS
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: KITCHEN_LAT
        value: "17.9784"
      - key: KITCHEN_LNG
        value: "79.5941"
      - key: RESEND_API_KEY
        value: ""

  # ── Redis Key-Value Store ──
  - type: keyvalue
    name: kitchen-redis
    plan: free
    ipAllowList: []

# ── Databases ──
databases:
  - name: kitchen-db
    plan: free
    databaseName: kitchen_db
    user: kitchen
