services:
  # ── Fastify API Server ──
  - type: web
    name: kitchen-api
    runtime: node
    plan: free
    buildCommand: |
      npm install
      npm run build -w packages/shared
      npm run build -w apps/api
    startCommand: cd apps/api && node dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: kitchen-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: kitchen-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://the-katanguris-kitchen.vercel.app,https://the-katanguris-kitchen-admin.vercel.app"
      - key: APP_URL
        value: "https://the-katanguris-kitchen.vercel.app"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        value: "orders@thekatanguriskitchen.com"
      - key: ALERT_EMAIL_TO
        value: "admin@thekatanguriskitchen.com"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        value: "+919676164725"
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ENABLE_DEV_BYPASS
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: KITCHEN_LAT
        value: "17.9784"
      - key: KITCHEN_LNG
        value: "79.5941"

# ── Databases ──
databases:
  - name: kitchen-db
    plan: free
    databaseName: kitchen_db
    user: kitchen

  - name: kitchen-redis
    plan: free
